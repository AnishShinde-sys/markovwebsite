<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markov | Automating your company&rsquo;s most valuable tasks</title>
    <link rel="icon" type="image/svg+xml" href="assets/markov_symbol_3.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Eliza';
            src: url('fonts/Eliza-Regular.woff2') format('woff2'),
                 url('fonts/Eliza-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Eliza';
            src: url('fonts/Eliza-RegularItalic.woff2') format('woff2'),
                 url('fonts/Eliza-RegularItalic.woff') format('woff');
            font-weight: normal;
            font-style: italic;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-color: #f0ebe5;
            color: #241f21;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 720px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lockup {
            display: block;
            width: 100%;
            max-width: 442px;
            height: auto;
            margin-bottom: 2rem;
        }

        p {
            font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
            font-size: 1.125rem;
            font-weight: 400;
            line-height: 1.33;
            letter-spacing: 0.005em;
            word-spacing: -0.1em;
            color: #241f21;
        }

        p + p {
            margin-top: 1rem;
        }

        a {
            display: inline-block;
            margin-top: 2rem;
            font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
            font-size: 1.125rem;
            font-weight: 400;
            letter-spacing: 0.005em;
            word-spacing: -0.1em;
            color: #241f21;
            text-decoration: underline;
            text-underline-offset: 0.2em;
            text-decoration-thickness: 1px;
            text-decoration-color: #8a8582;
        }

        a:hover {
            text-decoration-color: #241f21;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="lockup" src="assets/markov_lockup.gif" alt="Markov">
        <p>Automating your company&rsquo;s most valuable tasks.</p>
        <a href="mailto:anish@markov.co">anish@markov.co</a>
    </div>
</body>
</html>
